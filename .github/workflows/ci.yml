name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    env:
      # Provide dummy values so pydantic-settings doesn't warn at import time.
      # No real services are called — all tests are fully mocked.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workflow_db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      OPENAI_API_KEY: ci-placeholder-not-used
      APP_ENV: test
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short
