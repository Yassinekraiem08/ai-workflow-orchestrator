# Continuous deployment to AWS ECS on every push to main.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN      — ARN of the IAM role configured for OIDC federation
#                       (e.g. arn:aws:iam::123456789012:role/github-actions-deploy)
#   AWS_REGION        — Target AWS region (e.g. us-east-1)
#   ECR_REPOSITORY    — ECR repository name (e.g. ai-workflow-orchestrator)
#
# The IAM role trust policy must allow the GitHub OIDC provider to assume it.
# See docs/aws-deployment.md for the exact trust policy and setup steps.

name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  ECS_CLUSTER:      ai-workflow-orchestrator-production
  ECS_SERVICE_API:  ai-workflow-orchestrator-production-api
  ECS_SERVICE_WORKER: ai-workflow-orchestrator-production-worker

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY"

          docker build \
            --tag "$IMAGE_URI:$SHA" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            .

          docker push "$IMAGE_URI:$SHA"
          docker push "$IMAGE_URI:latest"

          echo "image=$IMAGE_URI:$SHA" >> "$GITHUB_OUTPUT"

      - name: Force new deployment — API service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --force-new-deployment \
            --output text \
            --query 'service.serviceName'

      - name: Force new deployment — worker service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WORKER" \
            --force-new-deployment \
            --output text \
            --query 'service.serviceName'

      - name: Wait for API service to stabilize
        run: |
          echo "Waiting for ECS service to stabilize (up to 15 minutes)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE_API" \
              --query 'services[0].deployments' \
              --output json)
            RUNNING=$(echo "$STATUS" | python3 -c "
          import sys, json
          deployments = json.load(sys.stdin)
          primary = next((d for d in deployments if d['status'] == 'PRIMARY'), None)
          print(primary['runningCount'] if primary else 0)
          ")
            DESIRED=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE_API" \
              --query 'services[0].desiredCount' \
              --output text)
            echo "Attempt $i/60 — running=$RUNNING desired=$DESIRED"
            if [ "$RUNNING" = "$DESIRED" ] && [ "$DESIRED" -gt 0 ]; then
              echo "Service is stable."
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: Service did not fully stabilize within 15 minutes, but deployment was triggered successfully."
          exit 0
